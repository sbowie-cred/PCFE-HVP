spec:
  containers:
    - name: hvp-dashboard
      image: YV35611.registry.east-us-2.snowflakecomputing.com/cashflow_engine.fra_pcfe/hvp-dashboard:latest
      env:
        SNOWFLAKE_WAREHOUSE: FRA
      resources:
        requests:
          cpu: "1"
          memory: 2G
        limits:
          cpu: "2"
          memory: 4G
  endpoints:
    - name: dashboard
      port: 8080
      public: true
