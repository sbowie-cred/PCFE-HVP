spec:
  containers:
    - name: hvp-dashboard
      image: <IMAGE_REPOSITORY>/<IMAGE_NAME>:<TAG>
      # SPCS injects Snowflake credentials automatically;
      # get_active_session() inside snowflake_session.py picks them up.
      env:
        SNOWFLAKE_WAREHOUSE: FRA
      resources:
        requests:
          cpu: "1"
          memory: 2G
        limits:
          cpu: "2"
          memory: 4G
  endpoints:
    - name: dashboard
      port: 8080
      public: true
